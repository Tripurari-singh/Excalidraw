apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: drawspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: drawspace
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drawspace-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: drawspace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
