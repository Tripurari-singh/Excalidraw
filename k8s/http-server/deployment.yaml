apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: drawspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
    spec:
      containers:
        - name: http-server
          image: ghcr.io/tripurari-singh/excalidraw-http-server:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drawspace-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drawspace-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "3000"
            - name: FRONTEND_URL
              value: "http://frontend-service:3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
