apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: drawspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tripurari-singh/excalidraw-frontend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_HTTP_URL
              value: "http://http-server-service:3000"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://ws-server-service:8080"
            - name: PORT
              value: "3001"
