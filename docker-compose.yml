services:
  postgres:
    image: postgres:16-alpine
    container_name: drawspace-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drawspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  http-server:
    build:
      context: .
      dockerfile: Dockerfile.http-server
    container_name: drawspace-http
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drawspace
      JWT_SECRET: drawspace-super-secret-key-2024
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

  ws-server:
    build:
      context: .
      dockerfile: Dockerfile.ws-server
    container_name: drawspace-ws
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drawspace
      JWT_SECRET: drawspace-super-secret-key-2024
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: drawspace-frontend
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_HTTP_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - http-server
      - ws-server

volumes:
  postgres_data:
