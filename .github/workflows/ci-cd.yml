name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tripurari-singh/excalidraw

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm exec turbo run build

  # ── Build & Push Docker Images ──────────────────────────────────────────────
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push http-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.http-server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-http-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ws-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ws-server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-ws-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
